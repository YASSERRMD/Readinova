name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "phase_*"
      - "improve/**"

permissions:
  contents: read
  security-events: write # for Trivy SARIF upload

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
      - run: cargo fmt --all -- --check
        working-directory: crates
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: crates
      - run: cargo test --workspace
        working-directory: crates
      - name: Build scoring cdylib
        run: |
          cargo build --release -p scoring
          mkdir -p ../libs/go-scoring/lib
          cp target/release/libscoring.so ../libs/go-scoring/lib/libscoring.so
        working-directory: crates
      - name: Upload scoring lib
        uses: actions/upload-artifact@v4
        with:
          name: libscoring-linux-amd64
          path: libs/go-scoring/lib/libscoring.so

  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    needs: rust
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: readinova_test
          POSTGRES_PASSWORD: readinova
          POSTGRES_USER: readinova
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U readinova -d readinova_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: |
            go.sum
            apps/api/go.sum
            libs/go-scoring/go.sum
      - name: Download scoring lib
        uses: actions/download-artifact@v4
        with:
          name: libscoring-linux-amd64
          path: libs/go-scoring/lib/
      - run: go work sync
      - run: go build ./...
      - name: go vet
        run: go vet ./...
        working-directory: apps/api
      - name: Run database migrations
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          goose -dir migrations postgres "$READINOVA_DATABASE_URL" up
        env:
          READINOVA_DATABASE_URL: postgres://readinova:readinova@localhost:54329/readinova_test?sslmode=disable
      - run: go test ./... -race -count=1
        working-directory: apps/api
        env:
          READINOVA_DATABASE_URL: postgres://readinova:readinova@localhost:54329/readinova_test?sslmode=disable
      - run: go test ./...
        working-directory: libs/go-scoring

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @readinova/web lint
      - run: pnpm --filter @readinova/web build
      - name: TypeScript type-check
        run: pnpm --filter @readinova/web exec tsc --noEmit

  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  go-security:
    name: Go security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
        working-directory: apps/api
