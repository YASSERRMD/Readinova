name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "phase_*"

jobs:
  go:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: readinova_test
          POSTGRES_PASSWORD: readinova
          POSTGRES_USER: readinova
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U readinova -d readinova_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: |
            go.sum
            apps/api/go.sum
            libs/go-scoring/go.sum
      - run: go work sync
      - run: go build ./...
      - run: go test ./...
        working-directory: apps/api
        env:
          READINOVA_DATABASE_URL: postgres://readinova:readinova@localhost:54329/readinova_test?sslmode=disable
      - run: go test ./...
        working-directory: libs/go-scoring

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
      - run: cargo fmt --all -- --check
        working-directory: crates
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: crates
      - run: cargo test --workspace
        working-directory: crates

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @readinova/web lint
      - run: pnpm --filter @readinova/web build
